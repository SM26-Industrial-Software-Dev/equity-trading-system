---
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
---
# This tells K3s to automatically download and install the Loki-Stack Helm Chart
apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: loki-stack
  namespace: kube-system
spec:
  targetNamespace: monitoring
  repo: https://grafana.github.io/helm-charts
  chart: loki-stack
  # We use a specific version for stability
  version: 2.9.11
  # These are the Helm "values" we override.
  # We turn ON Grafana and Promtail, and tell Promtail to read everything.
  set:
    grafana.enabled: "true"
    promtail.enabled: "true"
    loki.persistence.enabled: "false" # Keep logs in RAM for local dev to save disk space
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana-ingress
  namespace: monitoring
spec:
  rules:
    - host: grafana.localhost # We use a specific host to separate it from your API traffic
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: loki-stack-grafana
                port:
                  number: 80
