---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  - target:
      kind: HelmRelease
      name: loki-stack
    patch: |-
      apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      metadata:
        name: loki-stack
      spec:
        values:
          prometheus:
            server:
              global:
                scrape_interval: 15s
  - target:
      kind: HorizontalPodAutoscaler
      name: fastapi-hpa
    patch: |-
      apiVersion: autoscaling/v2
      kind: HorizontalPodAutoscaler
      metadata:
        name: fastapi-hpa
      spec:
        maxReplicas: 6 # Max's custom pod limit
        # minReplicas: 1 # He can also override the minimum here if he wants!
